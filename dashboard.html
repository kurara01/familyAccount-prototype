<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭账户 · 家庭看板</title>
<link rel="stylesheet" href="common.css">
<style>
  /* --- 看板 - 总余额卡片 --- */
  .balance-card {
    margin: 0 0 var(--sp-sm);
    padding: var(--sp-lg) var(--sp-md) var(--sp-md);
    background: linear-gradient(180deg, #F7F4EF 0%, #FFFFFF 78%);
    border-radius: 0;
    color: var(--color-title);
    position: relative;
  }
  .balance-label { font-size: var(--fs-sm); color: var(--color-secondary); margin-bottom: var(--sp-xxs); }
  .balance-amount { font-size: 38px; font-family: var(--font-num); font-weight: 700; line-height: 1.2; }
  .balance-unit { font-size: var(--fs-base); font-weight: 400; margin-left: 2px; }
  .balance-meta { display: flex; justify-content: space-between; align-items: flex-end; margin-top: var(--sp-xs); }
  .balance-members { font-size: var(--fs-sm); color: var(--color-secondary); }
  .balance-family-name { font-size: var(--fs-sm); color: var(--color-secondary); }

  /* --- 成员列表 --- */
  .member-list-card { margin: 0 var(--sp-md) var(--sp-sm); }
  .section-title {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--sp-sm) var(--sp-md);
  }
  .section-title-text { font-size: var(--fs-md); font-weight: 600; color: var(--color-title); }
  .section-title-num { font-size: var(--fs-sm); color: var(--color-secondary); }
  .member-row {
    display: flex; align-items: center; padding: var(--sp-sm) var(--sp-md);
    border-bottom: 0.5px solid var(--color-divider);
    background: var(--color-white);
  }
  .member-row:last-child { border-bottom: none; border-radius: 0 0 var(--radius-md) var(--radius-md); }
  .member-row-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--color-warm-bg);
    margin-right: var(--sp-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: var(--fs-md);
    flex-shrink: 0;
  }
  .member-row-info { flex: 1; min-width: 0; }
  .member-row-name { font-size: var(--fs-base); font-weight: 500; color: var(--color-title); }
  .member-row-role { font-size: var(--fs-xs); color: var(--color-placeholder); }
  .member-row-balance { text-align: right; }
  .member-row-balance-amount { font-family: var(--font-num); font-weight: 700; font-size: var(--fs-md); color: var(--color-title); }
  .member-row-balance-label { font-size: var(--fs-xs); color: var(--color-placeholder); }
  .member-row.overflow { display: none; }
  .member-row.overflow.show { display: flex; }

  .member-fold-btn {
    display: flex; align-items: center; justify-content: center; gap: var(--sp-xxs);
    padding: var(--sp-xs) var(--sp-md);
    font-size: var(--fs-sm);
    color: var(--color-title);
    cursor: pointer;
    background: var(--color-white);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }
  .member-fold-btn:active { background: var(--color-bg); }

  /* --- 消费动态卡片 --- */
  .tx-preview-card { margin: 0 var(--sp-md); }
  .tx-preview-item {
    display: flex; align-items: center; padding: var(--sp-sm) var(--sp-md);
    border-bottom: 0.5px solid var(--color-divider);
    background: var(--color-white);
  }
  .tx-preview-item:last-child { border-bottom: none; border-radius: 0 0 var(--radius-md) var(--radius-md); }
  .tx-preview-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--color-warm-bg);
    display: flex; align-items: center; justify-content: center;
    margin-right: var(--sp-sm);
    font-size: 16px;
    flex-shrink: 0;
  }
  .tx-preview-info { flex: 1; min-width: 0; }
  .tx-preview-title { font-size: var(--fs-base); color: var(--color-title); }
  .tx-preview-detail { font-size: var(--fs-xs); color: var(--color-secondary); margin-top: 2px; }
  .tx-preview-date { font-size: var(--fs-sm); color: var(--color-placeholder); white-space: nowrap; flex-shrink: 0; }

  .view-more {
    color: var(--color-title); font-size: var(--fs-sm);
    text-decoration: none; display: flex; align-items: center; gap: var(--sp-xxs);
  }

  /* --- 设置图标 --- */
  .settings-icon-wrapper { position: relative; display: inline-block; }
  .settings-icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; color: var(--color-body);
  }
  .settings-icon-wrapper .red-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--color-error);
    top: 8px; right: 8px;
  }

  /* --- 邀请按钮 --- */
  .invite-section {
    padding: var(--sp-md);
    text-align: center;
  }
  .invite-desc {
    font-size: var(--fs-sm); color: var(--color-secondary);
    margin-bottom: var(--sp-sm);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- 导航栏 -->
  <div class="navbar">
    <button class="navbar-back">←</button>
    <div class="navbar-title">家庭账户</div>
    <div class="navbar-action">
      <div class="settings-icon-wrapper" onclick="goToSettings()">
        <div class="settings-icon">⚙</div>
        <div class="red-dot" id="approvalDot" style="display: flex;"></div>
      </div>
    </div>
  </div>

  <div class="page-content">

    <!-- 总余额卡片 -->
    <div class="balance-card">
      <div class="flex-between">
        <div>
          <div class="balance-label">家庭储值余额</div>
          <div class="balance-amount">1,130<span class="balance-unit">元</span></div>
        </div>
        <div style="text-align:right;">
          <div class="tag" style="background:#111;color:#fff;font-size:14px;padding:4px 14px;border-radius:999px;">快乐一家</div>
        </div>
      </div>
      <div class="balance-meta">
      </div>
    </div>

    <!-- 成员个人储值余额列表 -->
    <div class="member-list-card card">
      <div class="section-title">
        <span class="section-title-text">家庭成员</span>
        <span class="section-title-num">已加入 5 人，还可邀请 3 人</span>
      </div>
      <div class="member-row">
        <div class="member-row-avatar">🧑</div>
        <div class="member-row-info">
          <div class="member-row-name">小明 (爸爸)<span class="tag tag-primary" style="font-size:9px;margin-left:4px;">主号</span></div>
        </div>
        <div class="member-row-balance">
          <div class="member-row-balance-amount">¥500</div>
          <div class="member-row-balance-label">个人储值余额</div>
        </div>
      </div>
      <div class="member-row">
        <div class="member-row-avatar">👩</div>
        <div class="member-row-info">
          <div class="member-row-name">小红 (妈妈)</div>
        </div>
        <div class="member-row-balance">
          <div class="member-row-balance-amount">¥300</div>
          <div class="member-row-balance-label">个人储值余额</div>
        </div>
      </div>
      <div class="member-row">
        <div class="member-row-avatar">👨‍🦳</div>
        <div class="member-row-info">
          <div class="member-row-name">大刚 (爷爷)</div>
        </div>
        <div class="member-row-balance">
          <div class="member-row-balance-amount">¥200</div>
          <div class="member-row-balance-label">个人储值余额</div>
        </div>
      </div>
      <div class="member-row overflow">
        <div class="member-row-avatar">👦</div>
        <div class="member-row-info">
          <div class="member-row-name">小宝 (儿子)</div>
        </div>
        <div class="member-row-balance">
          <div class="member-row-balance-amount">¥50</div>
          <div class="member-row-balance-label">个人储值余额</div>
        </div>
      </div>
      <div class="member-row overflow">
        <div class="member-row-avatar">👧</div>
        <div class="member-row-info">
          <div class="member-row-name">小花 (女儿)</div>
        </div>
        <div class="member-row-balance">
          <div class="member-row-balance-amount">¥80</div>
          <div class="member-row-balance-label">个人储值余额</div>
        </div>
      </div>
      <div class="member-fold-btn" onclick="toggleMembers(this)">
        <span>展开更多</span><span style="font-size:10px;">▾</span>
      </div>
    </div>

    <!-- 最近消费动态 -->
    <div class="tx-preview-card card">
      <div class="section-title">
        <span class="section-title-text">最近消费</span>
        <a href="transactions.html" class="view-more">全部 →</a>
      </div>
      <div class="tx-preview-item">
        <div class="tx-preview-icon">🛒</div>
        <div class="tx-preview-info">
          <div class="tx-preview-title">小明 (爸爸) 消费 ¥200</div>
          <div class="tx-preview-detail">使用家庭储值余额 ¥150</div>
        </div>
        <div class="tx-preview-date">6月15日</div>
      </div>
      <div class="tx-preview-item">
        <div class="tx-preview-icon">🛒</div>
        <div class="tx-preview-info">
          <div class="tx-preview-title">小红 (妈妈) 消费 ¥80</div>
          <div class="tx-preview-detail">使用家庭储值余额 ¥80</div>
        </div>
        <div class="tx-preview-date">6月13日</div>
      </div>
      <div class="tx-preview-item">
        <div class="tx-preview-icon">🛒</div>
        <div class="tx-preview-info">
          <div class="tx-preview-title">大刚 (爷爷) 消费 ¥150</div>
          <div class="tx-preview-detail">使用家庭储值余额 ¥150</div>
        </div>
        <div class="tx-preview-date">6月12日</div>
      </div>
    </div>

    <!-- 邀请家人按钮 -->
    <div class="invite-section">
      <button class="btn btn-secondary btn-block" onclick="goToInvite()">邀请家人</button>
    </div>

  </div><!-- /page-content -->
</div>

<script>
function goToSettings() {
  window.location.href = 'settings-panel.html';
}
function goToInvite() {
  window.location.href = 'invite-qr.html';
}
function toggleMembers(btn) {
  const rows = document.querySelectorAll('.member-row.overflow');
  const expanded = rows[0].classList.contains('show');
  rows.forEach(r => r.classList.toggle('show', !expanded));
  btn.innerHTML = expanded ? '<span>展开更多</span><span style="font-size:10px;">▾</span>' : '<span>收起</span><span style="font-size:10px;">▴</span>';
}
</script>

</body>
</html>
